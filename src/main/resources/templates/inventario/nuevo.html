<!DOCTYPE html>
<html  xmlns:th="http://www.thymeleaf.org"
       xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="fragmentos :: headerfiles">
</head>
<body>
<!-- Layout wrapper -->
<div class="layout-wrapper layout-content-navbar" sec:authorize="isAuthenticated()">
    <div class="layout-container">
        <!-- Menu -->
        <div th:insert="fragmentos :: menu"></div>
        <!-- Layout container -->
        <div class="layout-page">
            <!-- Navbar -->
            <div th:insert="fragmentos :: navbar"></div>
            <div class="content-wrapper">
                <!-- Content -->
                <div class="container-xxl flex-grow-1 container-p-y">
                    <h4 class="fw-bold py-3 mb-4"><span class="text-muted fw-light">Formulario/</span> inventario</h4>
                    <div class="row">
                        <div class="col-xl">
                            <div class="card mb-12">
                                <div class="card-header d-flex justify-content-between align-items-center">
                                    <h5 class="mb-0">Basico</h5>
                                    <small class="text-muted float-end">Default label</small>
                                </div>
                                <div class="card-body">
                                    <form th:action="@{/inventario/guardar}" method="POST" th:object="${inventarioDTO}">
                                        <!-- control ataque csrf -->
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <!-- fin control ataque csrf -->
                                        <div class="mb-3">
                                            <label for="nombre" class="form-label">producto</label>
                                            <input type="text" id="nombre" name="nombre" placeholder="Nombre">
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label" for="precio">precio</label>
                                            <input type="text" pattern="^\d+([.,]\d{1,2})?$" class="form-control" id="precio"  name="precio" required="required" placeholder="..." autocomplete="off">
                                        </div>
                                        <div class="mb-3">
                                            <label for="stock" class="form-label">stock</label>
                                            <input type="number" id="stock" name="stock" placeholder="stock">
                                        </div>

                                        <button type="submit" class="btn btn-primary"><i class="far fa-save"></i>Envoar</button>
                                    </form>

                                    <br>
                                    <a class="btn btn-secondary d-grid w-100" th:href="@{/}">Regresar</a>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
                <!-- /Content -->
                <div th:insert="fragmentos :: footer"></div>
                <div class="content-backdrop fade"></div>
            </div>
        </div>

    </div>
    <div class="layout-overlay layout-menu-toggle"></div>
</div>

<div th:insert="fragmentos :: scripts"></div>
<div th:insert="fragmentos :: sweetalert"></div>
</body>
</html>
