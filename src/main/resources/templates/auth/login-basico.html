<!DOCTYPE html>
<html  xmlns:th="http://www.thymeleaf.org"
       xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="fragmentos :: headerfiles">
</head>
<body>

<div class="container-xxl d-flex flex-wrap justify-content-center py-2 flex-md-row flex-column">
    <div class="authentication-wrapper authentication-basic container-p-y">
        <div class="authentication-inner">
            <!-- Register -->
            <div class="card">
                <div class="card-body">
                    <!-- Logo -->
                    <div class="app-brand justify-content-center">
                        <a href="#" class="app-brand-link gap-2">
                            <div th:insert="fragmentos :: logo"></div>
                            <span class="app-brand-text demo text-body fw-bolder">Login</span>
                        </a>
                    </div>
                    <br>
                    <div th:if="${registroOK}" class="alert alert-success alert-dismissible fade show mt-2" role="alert">
                        <p th:text="${registroOK}"></p>
                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <form id="formAuthentication" class="mb-3" th:action="@{/signin}" method="POST" sec:authorize="!isAuthenticated()">
                        <!-- control ataque csrf -->
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <!-- fin control ataque csrf -->
                        <div class="mb-3">
                            <label for="nombreUsuario" class="form-label">Username</label>
                            <input
                                    type="text"
                                    class="form-control"
                                    id="nombreUsuario"
                                    name="nombreUsuario"
                                    placeholder="nombreUsuario"
                                    autofocus
                            />
                        </div>
                        <div class="mb-3 form-password-toggle">
                            <div class="d-flex justify-content-between">
                                <label class="form-label" for="password">Password</label>
<!--                                <a href="#">-->
<!--                                    <small>Olvidaste el Password?</small>-->
<!--                                </a>-->
                            </div>
                            <div class="input-group input-group-merge">
                                <input
                                        type="password"
                                        id="password"
                                        class="form-control"
                                        name="password"
                                        placeholder="&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;"
                                        aria-describedby="password"
                                />
                                <span class="input-group-text cursor-pointer"><i class="bx bx-hide"></i></span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember-me" />
                                <label class="form-check-label" for="remember-me"> Remember Me </label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <button class="btn btn-primary d-grid w-100" type="submit">Ingresar</button>
                        </div>
                    </form>
                    <a th:href="@{/usuario/registro}" sec:authorize="hasRole('ADMIN')">
                        <small>Crear Cuenta</small>
                    </a>
                    <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show mt-2" role="alert">
                        <p>Credenciales Erróneas</p>
                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                </div>
            </div>
            <div class="card-body" sec:authorize="isAuthenticated()">
                <h5 class="card-title">admin tal takl</h5>
                <p class="card-text">ya inciaste sesion dfsdfs.</p>
                <a href="javascript:void(0)" class="btn btn-primary">regresar a home</a>
            </div>
            <!-- /Register -->
        </div>
    </div>
</div>

<div th:insert="fragmentos :: scripts"></div>
</body>
</html>
