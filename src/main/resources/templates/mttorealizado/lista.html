<!DOCTYPE html>
<html  xmlns:th="http://www.thymeleaf.org"
       xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="fragmentos :: headerfiles">
</head>
<body>
<!-- Layout wrapper -->
<div class="layout-wrapper layout-content-navbar" sec:authorize="isAuthenticated()">
    <div class="layout-container">
        <!-- Menu -->
        <div th:insert="fragmentos :: menu"></div>
        <!-- Layout container -->
        <div class="layout-page">
            <!-- Navbar -->
            <div th:insert="fragmentos :: navbar"></div>
            <div class="content-wrapper">
                <!-- Content -->
                <div class="container-xxl flex-grow-1 container-p-y">
                    <h4 class="fw-bold py-3 mb-4"><span class="text-muted fw-light">Tables /</span> Basic Tables</h4>
                    <div class="card">
                        <h5 class="card-header">Table Basic</h5>
                        <div class="table-responsive text-nowrap">
                            <table class="table">
                                <thead>
                                <tr>
                                    <th>Id</th>
                                    <th>tipo servcioo</th>
                                    <th>fecha</th>
                                    <th>tecnico</th>
                                    <th>detalle</th>
                                    <th>Acciones</th>
                                </tr>
                                </thead>
                                <tbody class="table-border-bottom-0">
                                <tr th:each="mttorealizado, iterStat : ${mttorealizados}">
                                    <td th:text="${iterStat.count}"><i class="fab fa-angular fa-lg text-danger me-3"></i></td>
                                    <td>
                                        <span th:if="${mttorealizado.tipoServicio.name() == 'MANTENIMIENTO'}" style="color:gray;">MANTENIMIENTO</span>
                                        <span th:if="${mttorealizado.tipoServicio.name() == 'REPARACION'}" style="color:orange;">EN REPARACION</span>
                                        <span th:if="${mttorealizado.tipoServicio.name() == 'INSTALACION'}" style="color:green;">FINALIZADO</span>
                                    </td>
                                    <td th:text="${mttorealizado.fecha}"></td>
                                    <td th:text="${mttorealizado.tecnico}"></td>

                                    <!-- Producto -->
                                    <td th:text="${mttorealizado.detalle}"></td>
                                    <!-- Descripción -->

                                    <td>
                                        <ul class="list-unstyled users-list m-0 avatar-group d-flex align-items-center">

                                            <!-- VER -->
                                            <li class="avatar avatar-xs pull-up bg-info text-white d-flex justify-content-center align-items-center me-3"
                                                >
                                                <a th:href="@{/mttorealizado/detalle/{id}(id=${mttorealizado.id})}"
                                                   class="text-white">
                                                    <i class="bx bx-show"></i>
                                                </a>
                                            </li>

                                            <!-- EDITAR -->
                                            <li class="avatar avatar-xs pull-up bg-warning text-white d-flex justify-content-center align-items-center me-3">
                                                <a th:href="@{/mttorealizado/editar/{id}(id=${mttorealizado.id})}"
                                                   class="text-white">
                                                    <i class="bx bx-edit-alt"></i>
                                                </a>
                                            </li>

                                            <!-- ELIMINAR / DESACTIVAR -->
                                            <li class="avatar avatar-xs pull-up bg-danger text-white d-flex justify-content-center align-items-center"
                                                >
                                                <a th:href="@{/mttorealizado/borrar/{id}(id=${mttorealizado.id})}"
                                                   class="text-white"
                                                   onclick="return confirm('¿Desactivar ticket?')">
                                                    <i class="bx bx-trash"></i>
                                                </a>
                                            </li>

                                        </ul>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <!-- /Content -->
                <div class="content-backdrop fade"></div>
            </div>
        </div>

    </div>
    <div class="layout-overlay layout-menu-toggle"></div>
</div>

<div th:insert="fragmentos :: scripts"></div>
<div th:insert="fragmentos :: sweetalert"></div>
</body>
</html>
