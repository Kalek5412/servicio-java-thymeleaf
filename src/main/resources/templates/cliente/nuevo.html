<!DOCTYPE html>
<html  xmlns:th="http://www.thymeleaf.org"
       xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="fragmentos :: headerfiles">
</head>
<body>
<!-- Layout wrapper -->
<div class="layout-wrapper layout-content-navbar" sec:authorize="isAuthenticated()">
    <div class="layout-container">
        <!-- Menu -->
        <div th:insert="fragmentos :: menu"></div>
        <!-- Layout container -->
        <div class="layout-page">
            <!-- Navbar -->
            <div th:insert="fragmentos :: navbar"></div>
            <div class="content-wrapper">
                <!-- Content -->
                <div class="container-xxl flex-grow-1 container-p-y">
                    <h4 class="fw-bold py-3 mb-4"><span class="text-muted fw-light">Formulario/</span> Cliente</h4>
                    <div class="row">
                        <div class="col-xl">
                            <div class="card mb-12">
                                <div class="card-header d-flex justify-content-between align-items-center">
                                    <h5 class="mb-0">Basico</h5>
                                    <small class="text-muted float-end">Default label</small>
                                </div>
                                <div class="card-body">
                                    <form th:action="@{/cliente/guardar}" method="POST" th:object="${cliente}">
                                        <!-- control ataque csrf -->
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <!-- fin control ataque csrf -->
                                        <div class="mb-3">
                                            <label class="form-label" for="nombre">Nombre</label>
                                            <input type="text" class="form-control" id="nombre"  name="nombre" required="required" placeholder="..." autocomplete="off">
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label" for="telefono">telefono</label>
                                            <input type="text" class="form-control" id="telefono"  name="telefono" required="required" placeholder="..." autocomplete="off">
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label" for="contacto">Contacto</label>
                                            <div class="input-group input-group-merge">
                                                <input type="text" id="contacto" name="contacto" class="form-control" placeholder="john.doe" aria-label="john.doe" aria-describedby="basic-default-email2">
                                            </div>
                                        </div>
<!--                                        <div class="mb-3">-->
<!--                                            <label for="exampleFormControlSelect1" class="form-label">Activo</label>-->
<!--                                            <select class="form-select" id="exampleFormControlSelect1" aria-label="Default select example" th:field="*{activo}">-->
<!--                                                <option value="true">Activo</option>-->
<!--                                                <option value="false">No activo</option>-->
<!--                                            </select>-->
<!--                                        </div>-->
                                        <button type="submit" class="btn btn-primary"><i class="far fa-save"></i>Envoar</button>
                                    </form>

                                    <br>
                                    <a class="btn btn-secondary d-grid w-100" th:href="@{/}">Regresar</a>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
                <!-- /Content -->
                <div th:insert="fragmentos :: footer"></div>
                <div class="content-backdrop fade"></div>
            </div>
        </div>

    </div>
    <div class="layout-overlay layout-menu-toggle"></div>
</div>

<div th:insert="fragmentos :: scripts"></div>
<div th:insert="fragmentos :: sweetalert"></div>
</body>
</html>
